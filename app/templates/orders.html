<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h2>Orders</h2>

<table border="1" cellpadding="10">
<tr>
    <th>Order ID</th>
    <th>Total</th>
    <th>Status</th>
</tr>

{% for order in data.orders %}
<tr>
    <td>{{ order.order_id }}</td>
    <td>{{ order.total_amount }}</td>
    <td>{{ order.status }}</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/">Back to Home</a>

</body>
</html>
