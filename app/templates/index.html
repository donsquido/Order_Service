
<!DOCTYPE html>
<html>
<head>
    <title>Order Service Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f7fa;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        /* NEW: alignment fixes */
        td.amount {
            text-align: center;
        }
        td.status {
            text-align: center;
        }
        td.orderid {
            text-align: center;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        tr[onclick] {
            cursor: pointer;
        }

        tr[onclick]:hover {
            background-color: #e6f2ff;
        }

        .links a {
            display: inline-block;
            margin-right: 15px;
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .links a:hover {
            background-color: #0056b3;
        }

        /* NEW: better inner table styling */
        table table {
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        table table th {
            background-color: #6fbf73;
        }
    </style>
</head>
<body>

<h1>Order Service Dashboard</h1>

<div class="card">
    <h2>Customer Details</h2>

    
    <p><b>Name:</b> Unknown</p>
    <p><b>Email:</b> thomas@avantcha.com</p>
    <p><b>Phone:</b> None</p>

    <h3>Orders</h3>

    <table>
        <tr>
            <th>Order ID</th>
            <th>Total Amount</th>
            <th>Status</th>
        </tr>

        

        <!-- CLICKABLE ORDER ROW -->
        <tr onclick="toggleItems('items-1')">
            <td class="orderid">AVOR-16150</td>
            <td class="amount">36.0</td>
            <td class="status">pending</td>
        </tr>

        <!-- ITEMS ROW -->
        <tr id="items-1" style="display:none;">
            <td colspan="3">
                <b>Items:</b>
                <table width="100%">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Product</th>
                            <th style="text-align:center;">Qty</th>
                            <th style="text-align:right;">Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                        <tr>
                            <td style="text-align:left;">TEA001</td>
                            <td style="text-align:center;">2</td>
                            <td style="text-align:right;">20.0</td>
                        </tr>
                        
                        <tr>
                            <td style="text-align:left;">TEA002</td>
                            <td style="text-align:center;">1</td>
                            <td style="text-align:right;">20.0</td>
                        </tr>
                        
                    </tbody>
                </table>
            </td>
        </tr>

        
    </table>
    
</div>

<div class="links">
    <h3>Test Links</h3>

    <a href="/view-orders?email=thomas@avantcha.com">View by Email</a>
    <a href="/view-orders?phone=1111111111">View by Phone</a>
    <a href="/view-orders?email=wrong@example.com">View Non-Existing</a>
</div>

<script>
function toggleItems(id) {
    var row = document.getElementById(id);
    if (row.style.display === "none") {
        row.style.display = "table-row";
    } else {
        row.style.display = "none";
    }
}
</script>

</body>
</html>
